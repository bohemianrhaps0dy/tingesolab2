server:
  port: 8080

spring:
  cloud:
    gateway:

      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedHeaders: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS

      routes:

        - id: income
          uri: http://ms-income:8082
          predicates:
            - Path=/api/v1/income/**

        - id: expenses
          uri: http://ms-expenses:8081
          predicates:
            - Path=/api/v1/expenses/**

        - id: moves
          uri: http://ms-moves:8083
          predicates:
            - Path=/api/v1/moves/**
